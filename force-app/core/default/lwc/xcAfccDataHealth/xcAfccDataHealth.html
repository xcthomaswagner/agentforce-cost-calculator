<template>
  <lightning-card title="XC AFCC Data Health" icon-name="utility:success">
    <div slot="actions" class="actions">
      <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" title="Refresh" onclick={load}></lightning-button-icon>
      <lightning-button variant="brand" label="Run Health Check" onclick={run} disabled={busy}></lightning-button>
    </div>

    <div class="workspace">
      <section class="section">
        <div class="section-header">
          <div>
            <h2>Health Summary</h2>
            <p>Use this before reports or case analysis to catch missing, failed, or unallocated usage.</p>
          </div>
          <span class={badgeClass}>{resultLabel}</span>
        </div>

        <template if:true={summary}>
          <dl class="metrics">
            <div>
              <dt>Staging Rows</dt>
              <dd>{summary.stagingRows}</dd>
            </div>
            <div>
              <dt>Ledger Rows</dt>
              <dd>{summary.ledgerRows}</dd>
            </div>
            <div>
              <dt>Failed Rows <lightning-helptext content="Staging rows that could not be processed into ledger rows because required fields, rates, or supported billing values were missing."></lightning-helptext></dt>
              <dd>{summary.failedRows}</dd>
            </div>
            <div>
              <dt>Deferred Cases <lightning-helptext content="Cases marked as deferred in usage or ledger data. Useful for finding expensive unresolved support work."></lightning-helptext></dt>
              <dd>{summary.deferredCases}</dd>
            </div>
            <div>
              <dt>Total Cost</dt>
              <dd>
                <lightning-formatted-number value={summary.totalAllocatedCost} format-style="currency" currency-code="USD"></lightning-formatted-number>
              </dd>
            </div>
            <div>
              <dt>Unallocated % <lightning-helptext content="Percentage of usage rows that could not be linked to a Salesforce Case. Lower is better for case-level cost analysis."></lightning-helptext></dt>
              <dd>{summary.unallocatedUsagePercent}</dd>
            </div>
          </dl>
          <lightning-datatable key-field="name" data={summary.checks} columns={columns} hide-checkbox-column></lightning-datatable>
        </template>

        <template if:false={summary}>
          <div class="empty-state">
            <strong>No health check has loaded.</strong>
            <span>Run the health check to create the first summary.</span>
          </div>
        </template>
      </section>
    </div>
  </lightning-card>
</template>
