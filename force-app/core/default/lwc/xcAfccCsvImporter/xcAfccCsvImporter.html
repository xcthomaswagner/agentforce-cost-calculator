<template>
  <lightning-card title="XC AFCC CSV Fallback Importer" icon-name="utility:upload">
    <div class="workspace">
      <section class="section">
        <div class="section-header">
          <div>
            <h2>Fallback CSV Import</h2>
            <p>Use only when native Salesforce source discovery is unavailable. Native Service Cloud and Agentforce analysis is the primary path.</p>
          </div>
          <a href="/lightning/n/XC_AFCC_Setup">Back to Setup</a>
        </div>

        <lightning-textarea label="CSV Usage Data" value={csvBody} onchange={bodyChanged} disabled={busy} class="csv-input"></lightning-textarea>

        <div class="button-row">
          <lightning-button variant="brand" label="Import CSV Fallback" onclick={importData} disabled={busy}></lightning-button>
        </div>

        <template if:true={result}>
          <dl class="metrics">
            <div>
              <dt>Status</dt>
              <dd>{result.status}</dd>
            </div>
            <div>
              <dt>Rows</dt>
              <dd>{result.rowCount}</dd>
            </div>
            <div>
              <dt>Imported</dt>
              <dd>{result.successCount}</dd>
            </div>
            <div>
              <dt>Errors</dt>
              <dd>{result.errorCount}</dd>
            </div>
          </dl>
          <p class="result-message">{result.message}</p>
        </template>
      </section>
    </div>
  </lightning-card>
</template>
