<template>
  <lightning-card title="Admin Settings" icon-name="utility:settings">
    <div slot="actions" class="actions">
      <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" title="Refresh" onclick={load}></lightning-button-icon>
    </div>

    <div class="workspace">
      <section class="section">
        <div class="section-header">
          <div>
            <h2>Environment</h2>
            <p>Review install context and core feature availability.</p>
          </div>
          <a href="/lightning/n/XC_AFCC_Setup">Open Setup</a>
        </div>

        <template if:true={state}>
          <dl class="metrics">
            <div>
              <dt>Org Name</dt>
              <dd>{orgName}</dd>
            </div>
            <div>
              <dt>Org Type</dt>
              <dd>{orgType}</dd>
            </div>
            <div>
              <dt>Sandbox</dt>
              <dd>{sandboxStatus}</dd>
            </div>
            <div>
              <dt>Production</dt>
              <dd>{productionStatus}</dd>
            </div>
            <div>
              <dt>Configuration Records</dt>
              <dd>{state.configCount}</dd>
            </div>
            <div>
              <dt>CSV Fallback <lightning-helptext content="Fallback-only admin import path. Leave disabled unless native source discovery cannot be used for a controlled test or one-time import."></lightning-helptext></dt>
              <dd>{csvStatus}</dd>
            </div>
          </dl>
        </template>
      </section>

      <section class="section">
        <div class="section-header">
          <div>
            <h2>Cost Settings</h2>
            <p>Current billing, rate, allocation, and fallback settings.</p>
          </div>
          <a href="/lightning/o/XC_AFCC_Org_Config__c/list">Open Org Config</a>
        </div>

        <template if:true={hasConfig}>
          <dl class="metrics">
            <div>
              <dt>Billing Model <lightning-helptext content="Determines whether cost is calculated from credits, conversations, actions, or another configured cost basis."></lightning-helptext></dt>
              <dd>{billingModel}</dd>
            </div>
            <div>
              <dt>Allocation Method <lightning-helptext content="Controls how usage is assigned to cases when more than one relationship or allocation path exists."></lightning-helptext></dt>
              <dd>{allocationMethod}</dd>
            </div>
            <div>
              <dt>Contract Credit Rate <lightning-helptext content="Customer-specific cost per Agentforce credit when flex credit pricing is used."></lightning-helptext></dt>
              <dd>{contractCreditRate}</dd>
            </div>
            <div>
              <dt>Contract Conversation Rate <lightning-helptext content="Customer-specific cost per conversation when conversation pricing is used."></lightning-helptext></dt>
              <dd>{contractConversationRate}</dd>
            </div>
            <div>
              <dt>Default Credit Rate</dt>
              <dd>{defaultCreditRate}</dd>
            </div>
            <div>
              <dt>Default Conversation Rate</dt>
              <dd>{defaultConversationRate}</dd>
            </div>
            <div>
              <dt>Install Mode</dt>
              <dd>{installMode}</dd>
            </div>
            <div>
              <dt>CSV Fallback <lightning-helptext content="CSV is retained for explicit fallback use only and is not the primary Agentforce sandbox path."></lightning-helptext></dt>
              <dd>{csvStatus}</dd>
            </div>
          </dl>
        </template>

        <template if:false={hasConfig}>
          <div class="empty-state">
            <strong>No configuration record found.</strong>
            <span>Create the default configuration from Setup.</span>
          </div>
        </template>
      </section>

      <section class="section">
        <div class="section-header">
          <div>
            <h2>Help & Readiness</h2>
            <p>Use these definitions when setup or analysis readiness is unclear.</p>
          </div>
          <a href="/lightning/n/XC_AFCC_Data_Health">Open Data Health</a>
        </div>

        <div class="help-grid">
          <article>
            <h3>Native Source Discovery</h3>
            <p>The calculator checks Service Cloud and Agentforce objects that can be queried inside Salesforce. Supported source objects are discovered dynamically so Core can still deploy in orgs that do not have every feature enabled.</p>
          </article>
          <article>
            <h3>Readiness States</h3>
            <p><strong>ANALYSIS_READY</strong> means live ledger rows exist. <strong>NATIVE_READY</strong> means native source rows exist but have not been synced. <strong>READY_FOR_NATIVE_DATA</strong> means supported objects exist but no source rows were found. <strong>MISSING_NATIVE_SOURCE</strong> means the org lacks supported objects or access.</p>
          </article>
          <article>
            <h3>Cost Basis</h3>
            <p>Costs can be actual, allocated, estimated, or incomplete. Estimated rows should remain auditable through source object, source record id, billing model, and calculation basis.</p>
          </article>
          <article>
            <h3>Zero Native Rows</h3>
            <p>Confirm the target org has Agentforce or Service Cloud conversation/work activity, then check object permissions for MessagingSession, AgentWork, and Conversation.</p>
          </article>
          <article>
            <h3>CSV Fallback</h3>
            <p>CSV is available only as an explicit fallback path. It should not be used as the standard sandbox or production-like analysis workflow.</p>
          </article>
        </div>
      </section>

      <section class="section">
        <div class="section-header">
          <div>
            <h2>Demo Guard</h2>
            <p>Customer sandbox override state for Demo Harness access.</p>
          </div>
        </div>

        <dl class="metrics">
          <div>
            <dt>Override Enabled</dt>
            <dd>{demoOverrideEnabled}</dd>
          </div>
          <div>
            <dt>Override Expires</dt>
            <dd>{demoOverrideExpires}</dd>
          </div>
          <div>
            <dt>Override Reason</dt>
            <dd>{demoOverrideReason}</dd>
          </div>
        </dl>
      </section>

      <section class="section">
        <div class="section-header">
          <div>
            <h2>Admin Records</h2>
            <p>Internal records are grouped here instead of the primary navigation.</p>
          </div>
        </div>

        <div class="admin-links">
          <a href="/lightning/o/XC_AFCC_Cost_Ledger__c/list">Cost Ledger</a>
          <a href="/lightning/o/XC_AFCC_Usage_Staging__c/list">Usage Staging</a>
          <a href="/lightning/o/XC_AFCC_Import_Run__c/list">Import Runs</a>
          <a href="/lightning/o/XC_AFCC_Data_Health_Check__c/list">Data Health Checks</a>
          <a href="/lightning/o/XC_AFCC_Org_Config__c/list">Org Config</a>
          <a href="/lightning/o/XC_AFCC_Audit_Log__c/list">Audit Logs</a>
        </div>
      </section>
    </div>
  </lightning-card>
</template>
