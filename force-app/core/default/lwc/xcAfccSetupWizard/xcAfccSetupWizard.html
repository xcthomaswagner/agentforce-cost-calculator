<template>
  <lightning-card title="Agentforce Cost Calculator" icon-name="utility:settings">
    <div slot="actions" class="actions">
      <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" title="Refresh" onclick={load}></lightning-button-icon>
    </div>

    <div class="workspace">
      <section class="section">
        <div class="section-header">
          <div>
            <h2>Org Setup</h2>
            <p>Confirm the calculator is configured before analyzing native Salesforce data.</p>
          </div>
          <template if:true={needsConfig}>
            <lightning-button variant="brand" label="Create Default Config" onclick={ensure} disabled={busy}></lightning-button>
          </template>
        </div>

        <template if:true={state}>
          <dl class="metrics">
            <div>
              <dt>Configuration</dt>
              <dd>{configStatus}</dd>
            </div>
            <div>
              <dt>CSV Fallback <lightning-helptext content="Fallback-only admin import path. Native Salesforce and Agentforce source discovery is the primary path."></lightning-helptext></dt>
              <dd>{csvStatus}</dd>
            </div>
            <div>
              <dt>Org Type</dt>
              <dd>{orgType}</dd>
            </div>
            <div>
              <dt>Instance</dt>
              <dd>{instanceName}</dd>
            </div>
          </dl>
        </template>
      </section>

      <section class="section">
        <div class="section-header">
          <div>
            <h2>Native Source Discovery</h2>
            <p>Check Service Cloud and Agentforce source objects, then sync live usage into the cost ledger.</p>
          </div>
          <div class="header-actions">
            <span class={nativeBadgeClass}>{nativeResult}</span>
            <lightning-button variant="brand" label="Sync Native Usage" onclick={syncNative} disabled={busy}></lightning-button>
          </div>
        </div>

        <template if:true={nativeReadiness}>
          <dl class="metrics compact">
            <div>
              <dt>Cases</dt>
              <dd>{nativeReadiness.caseCount}</dd>
            </div>
            <div>
              <dt>Accounts</dt>
              <dd>{nativeReadiness.accountCount}</dd>
            </div>
            <div>
              <dt>Contacts</dt>
              <dd>{nativeReadiness.contactCount}</dd>
            </div>
            <div>
              <dt>Native Source Rows <lightning-helptext content="Rows found in supported Service Cloud or Agentforce source objects such as MessagingSession, AgentWork, or Conversation."></lightning-helptext></dt>
              <dd>{nativeReadiness.nativeSourceRows}</dd>
            </div>
            <div>
              <dt>Live Ledger Rows <lightning-helptext content="Normalized cost ledger rows created from native Salesforce source records and marked with source system LIVE."></lightning-helptext></dt>
              <dd>{nativeReadiness.liveLedgerRows}</dd>
            </div>
          </dl>

          <div class="table-wrap">
            <table class="slds-table slds-table_cell-buffer slds-table_bordered source-status-table">
              <thead>
                <tr>
                  <th scope="col">Source</th>
                  <th scope="col">Available</th>
                  <th scope="col">Accessible</th>
                  <th scope="col">Rows</th>
                </tr>
              </thead>
              <tbody>
                <template for:each={nativeSources} for:item="source">
                  <tr key={source.apiName}>
                    <th scope="row">{source.apiName}</th>
                    <td>{source.availableLabel}</td>
                    <td>{source.accessibleLabel}</td>
                    <td>{source.rowCount}</td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </template>

        <template if:true={nativeSyncResult}>
          <dl class="metrics compact">
            <div>
              <dt>Status</dt>
              <dd>{nativeSyncResult.status}</dd>
            </div>
            <div>
              <dt>Source Rows</dt>
              <dd>{nativeSyncResult.sourceRows}</dd>
            </div>
            <div>
              <dt>Staged</dt>
              <dd>{nativeSyncResult.stagedRows}</dd>
            </div>
            <div>
              <dt>Errors</dt>
              <dd>{nativeSyncResult.errorRows}</dd>
            </div>
          </dl>
        </template>

        <template if:true={hasNativeMessages}>
          <div class="empty-state">
            <template for:each={nativeMessages} for:item="message">
              <span key={message}>{message}</span>
            </template>
          </div>
        </template>
      </section>

      <section class="section">
        <div class="section-header">
          <div>
            <h2>Data Health</h2>
            <p>Run health checks before using reports or case-level explanations.</p>
          </div>
        </div>

        <div class="section-actions split">
          <span class={healthBadgeClass}>{healthResult}</span>
          <lightning-button variant="brand" label="Run Health Check" onclick={runHealth} disabled={busy}></lightning-button>
        </div>

        <template if:true={health}>
          <dl class="metrics compact">
            <div>
              <dt>Staging Rows</dt>
              <dd>{health.stagingRows}</dd>
            </div>
            <div>
              <dt>Ledger Rows</dt>
              <dd>{health.ledgerRows}</dd>
            </div>
            <div>
              <dt>Failed Rows</dt>
              <dd>{health.failedRows}</dd>
            </div>
            <div>
              <dt>Unallocated % <lightning-helptext content="Percentage of usage rows that could not be linked to a Salesforce Case. Lower is better for case-level cost analysis."></lightning-helptext></dt>
              <dd>{health.unallocatedUsagePercent}</dd>
            </div>
          </dl>
          <div class="table-wrap">
            <lightning-datatable key-field="name" data={health.checks} columns={healthColumns} hide-checkbox-column></lightning-datatable>
          </div>
        </template>
      </section>

      <section class="section">
        <div class="section-header">
          <div>
            <h2>Analyze</h2>
            <p>Review totals here, then use the detail pages for queue reporting and case explanations.</p>
          </div>
          <div class="link-row">
            <a href="/lightning/n/XC_AFCC_Cost_Dashboard">Dashboard</a>
            <a href="/lightning/n/XC_AFCC_Grouped_Report">Grouped Report</a>
            <a href="/lightning/n/XC_AFCC_Case_Explorer">Case Explorer</a>
          </div>
        </div>

        <template if:true={summary}>
          <dl class="metrics">
            <div>
              <dt>Ledger Rows</dt>
              <dd>{summary.ledgerRows}</dd>
            </div>
            <div>
              <dt>Linked Cases</dt>
              <dd>{summary.linkedCases}</dd>
            </div>
            <div>
              <dt>Allocated Cost <lightning-helptext content="Total cost assigned to ledger rows using the configured billing model, rates, and allocation method."></lightning-helptext></dt>
              <dd>
                <lightning-formatted-number value={summary.allocatedCost} format-style="currency" currency-code="USD"></lightning-formatted-number>
              </dd>
            </div>
            <div>
              <dt>Credits</dt>
              <dd>{summary.credits}</dd>
            </div>
          </dl>

          <template if:true={hasUsage}>
          <div class="table-wrap">
            <lightning-datatable key-field="groupValue" data={summary.costByQueue} columns={queueColumns} hide-checkbox-column></lightning-datatable>
          </div>
          </template>
          <template if:false={hasUsage}>
            <div class="empty-state">
              <strong>Ready for native analysis.</strong>
              <span>Sync native Service Cloud or Agentforce records to activate dashboard totals, grouped reports, and case explanations.</span>
            </div>
          </template>
        </template>
      </section>

      <template if:true={error}>
        <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">{error}</div>
      </template>
    </div>
  </lightning-card>
</template>
