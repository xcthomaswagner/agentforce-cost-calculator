<template>
  <lightning-card title="XC AFCC Cost Dashboard" icon-name="utility:chart">
    <div slot="actions" class="actions">
      <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" title="Refresh" onclick={load}></lightning-button-icon>
    </div>

    <div class="workspace">
      <section class="section">
        <div class="section-header">
          <div>
            <h2>Usage Cost Overview</h2>
            <p>Monitor live or synthetic Agentforce usage across cost, credits, case linkage, and queue concentration.</p>
          </div>
          <div class="link-row">
            <a href="/lightning/n/XC_AFCC_Grouped_Report">Grouped Report</a>
            <a href="/lightning/n/XC_AFCC_Case_Explorer">Case Explorer</a>
          </div>
        </div>

        <template if:true={summary}>
          <dl class="metrics">
            <div>
              <dt>Ledger Rows</dt>
              <dd>{summary.ledgerRows}</dd>
            </div>
            <div>
              <dt>Linked Cases</dt>
              <dd>{summary.linkedCases}</dd>
            </div>
            <div>
              <dt>Allocated Cost <lightning-helptext content="Total cost assigned to ledger rows using the configured billing model, rates, and allocation method."></lightning-helptext></dt>
              <dd>
                <lightning-formatted-number value={summary.allocatedCost} format-style="currency" currency-code="USD"></lightning-formatted-number>
              </dd>
            </div>
            <div>
              <dt>Credits</dt>
              <dd>{summary.credits}</dd>
            </div>
            <div>
              <dt>Conversations</dt>
              <dd>{summary.conversations}</dd>
            </div>
            <div>
              <dt>Unallocated % <lightning-helptext content="Percentage of usage rows that could not be linked to a Salesforce Case. Lower is better for case-level cost analysis."></lightning-helptext></dt>
              <dd>{summary.unallocatedUsagePercent}</dd>
            </div>
          </dl>

          <template if:true={hasUsage}>
            <lightning-datatable key-field="groupValue" data={summary.costByQueue} columns={columns} hide-checkbox-column></lightning-datatable>
          </template>
          <template if:false={hasUsage}>
            <div class="empty-state">
              <strong>No usage data yet.</strong>
              <span>Sync native Agentforce usage data or seed synthetic data from the Demo Harness to populate this dashboard.</span>
            </div>
          </template>
        </template>
      </section>
    </div>
  </lightning-card>
</template>
